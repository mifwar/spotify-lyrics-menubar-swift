name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        run: make dmg

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpotifyLyricsMenuBar.dmg
